<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型预览 - 暗夜跑团</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      color: #c9a04e;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #preview-container {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* 控制面板 */
    .controls {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(10,10,18,0.92);
      border: 1px solid rgba(201,160,78,0.3);
      border-radius: 8px;
      padding: 16px;
      min-width: 220px;
      max-width: 280px;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 10;
    }
    .controls h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #c9a04e;
    }
    .controls label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .controls select, .controls input[type="range"] {
      width: 100%;
      background: #1a1a24;
      color: #c9a04e;
      border: 1px solid rgba(201,160,78,0.3);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .controls input[type="range"] {
      -webkit-appearance: none;
      height: 6px;
      padding: 0;
      border: none;
      background: #333;
      border-radius: 3px;
    }
    .controls input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #c9a04e;
      border-radius: 50%;
      cursor: pointer;
    }

    /* 动作按钮 */
    .action-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .act-btn {
      padding: 5px 10px;
      background: rgba(201,160,78,0.1);
      border: 1px solid rgba(201,160,78,0.3);
      border-radius: 4px;
      color: #c9a04e;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .act-btn:hover {
      background: rgba(201,160,78,0.2);
      border-color: #c9a04e;
    }
    .act-btn.active {
      background: rgba(201,160,78,0.3);
      border-color: #c9a04e;
      color: #fff;
    }

    /* 状态信息 */
    .status {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(10,10,18,0.85);
      border: 1px solid rgba(201,160,78,0.2);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #888;
      z-index: 10;
    }
    .status .ok { color: #4a4; }
    .status .err { color: #c44; }

    /* 模型选择 */
    .model-select { margin-top: 8px; }
    .model-select option { background: #1a1a24; }

    /* 提示文字 */
    .hint {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #555;
      z-index: 10;
    }

    /* 加载按钮 */
    .load-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: rgba(201,160,78,0.15);
      border: 1px solid rgba(201,160,78,0.4);
      border-radius: 4px;
      color: #c9a04e;
      font-size: 13px;
      cursor: pointer;
    }
    .load-btn:hover { background: rgba(201,160,78,0.25); }
  </style>
</head>
<body>
  <div id="preview-container"></div>

  <div class="controls">
    <h2>🎭 模型预览</h2>
    
    <label>选择模型</label>
    <div class="model-select">
      <select id="model-url">
        <option value="assets/monster.glb">monster.glb</option>
      </select>
    </div>
    <button class="load-btn" id="btn-load">加载模型</button>

    <label>可用动作</label>
    <div class="action-list" id="action-list">
      <span style="color:#555;font-size:12px">加载模型后显示...</span>
    </div>

    <label>缩放 <span id="scale-value">auto</span></label>
    <input type="range" id="scale-slider" min="0.001" max="0.1" step="0.001" value="0.02">

    <label>旋转速度 <span id="rotate-value">0.5</span></label>
    <input type="range" id="rotate-slider" min="0" max="3" step="0.1" value="0.5">
  </div>

  <div class="status" id="status">初始化中...</div>
  <div class="hint">鼠标拖拽旋转 | 滚轮缩放 | 右键平移</div>

  <!-- Three.js -->
  <script src="js/three.min.js"></script>
  <script src="js/GLTFLoader.js"></script>

  <script>
    // ========== 预览场景初始化 ==========
    const container = document.getElementById('preview-container');
    const statusEl = document.getElementById('status');
    const actionListEl = document.getElementById('action-list');
    const scaleSlider = document.getElementById('scale-slider');
    const scaleValue = document.getElementById('scale-value');
    const rotateSlider = document.getElementById('rotate-slider');
    const rotateValue = document.getElementById('rotate-value');

    // Three.js基础
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.FogExp2(0x0a0a14, 0.005);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2.5, 3);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    // ========== 简易轨道控制器（不用CameraControls，避免冲突） ==========
    const orbit = {
      target: new THREE.Vector3(0, 1, 0),
      spherical: { radius: 5, theta: Math.PI / 4, phi: Math.PI / 3 },
      dragging: false,
      panning: false,
      lastPos: { x: 0, y: 0 },
      damping: 0.92,
      velocity: { theta: 0, phi: 0, radius: 0 }
    };

    function updateCameraFromSpherical() {
      const s = orbit.spherical;
      const sinPhi = Math.sin(s.phi);
      camera.position.set(
        orbit.target.x + s.radius * sinPhi * Math.sin(s.theta),
        orbit.target.y + s.radius * Math.cos(s.phi),
        orbit.target.z + s.radius * sinPhi * Math.cos(s.theta)
      );
      camera.lookAt(orbit.target);
    }
    updateCameraFromSpherical();

    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', (e) => {
      if (e.button === 2) { orbit.panning = true; }
      else { orbit.dragging = true; }
      orbit.lastPos = { x: e.clientX, y: e.clientY };
      e.preventDefault();
    });
    canvas.addEventListener('pointermove', (e) => {
      const dx = e.clientX - orbit.lastPos.x;
      const dy = e.clientY - orbit.lastPos.y;
      orbit.lastPos = { x: e.clientX, y: e.clientY };
      if (orbit.dragging) {
        orbit.spherical.theta -= dx * 0.005;
        orbit.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, orbit.spherical.phi - dy * 0.005));
        updateCameraFromSpherical();
      }
      if (orbit.panning) {
        const right = new THREE.Vector3();
        const up = new THREE.Vector3(0, 1, 0);
        right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), up).normalize();
        orbit.target.addScaledVector(right, -dx * 0.01);
        orbit.target.y += dy * 0.01;
        updateCameraFromSpherical();
      }
    });
    canvas.addEventListener('pointerup', () => { orbit.dragging = false; orbit.panning = false; });
    canvas.addEventListener('pointerleave', () => { orbit.dragging = false; orbit.panning = false; });
    canvas.addEventListener('wheel', (e) => {
      orbit.spherical.radius *= (1 + e.deltaY * 0.001);
      orbit.spherical.radius = Math.max(1, Math.min(20, orbit.spherical.radius));
      updateCameraFromSpherical();
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // ========== 影棚三点布光 ==========
    // 环境光：柔和基础照明
    const ambient = new THREE.AmbientLight(0x404050, 0.6);
    scene.add(ambient);
    // 半球光：天空/地面色温差异
    const hemi = new THREE.HemisphereLight(0xccccff, 0x443322, 0.5);
    scene.add(hemi);
    
    // 主灯（Key Light）：右前上方，暖白色，最强
    const keyLight = new THREE.DirectionalLight(0xfff0e0, 2.0);
    keyLight.position.set(4, 6, 3);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 0.1;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    keyLight.shadow.bias = -0.001;
    scene.add(keyLight);
    
    // 补光灯（Fill Light）：左前侧，冷色调，较弱
    const fillLight = new THREE.DirectionalLight(0xc0d0ff, 0.8);
    fillLight.position.set(-3, 4, 2);
    scene.add(fillLight);
    
    // 轮廓灯（Rim/Back Light）：正后方，强光勾勒轮廓
    const rimLight = new THREE.DirectionalLight(0xffd700, 1.2);
    rimLight.position.set(0, 5, -4);
    scene.add(rimLight);
    
    // 底灯（Fill Bottom）：地面反射补光，消除底部阴影
    const bottomFill = new THREE.PointLight(0x8899aa, 0.4, 8);
    bottomFill.position.set(0, 0.3, 1);
    scene.add(bottomFill);

    // 地面参考（格子线）
    const gridHelper = new THREE.GridHelper(10, 10, 0x333344, 0x222233);
    scene.add(gridHelper);

    // 圆形展台
    const platformGeo = new THREE.CylinderGeometry(1.2, 1.3, 0.08, 32);
    const platformMat = new THREE.MeshStandardMaterial({ color: 0x1a1a28, metalness: 0.3, roughness: 0.6 });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.y = 0.04;
    platform.receiveShadow = true;
    scene.add(platform);
    // 展台边缘发光环
    const ringGeo = new THREE.TorusGeometry(1.25, 0.015, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xc9a04e, transparent: true, opacity: 0.6 });
    const glowRing = new THREE.Mesh(ringGeo, ringMat);
    glowRing.rotation.x = -Math.PI / 2;
    glowRing.position.y = 0.09;
    scene.add(glowRing);

    // 中心标记
    const centerGeo = new THREE.RingGeometry(0.3, 0.5, 16);
    const centerMat = new THREE.MeshBasicMaterial({ color: 0xc9a04e, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
    const centerRing = new THREE.Mesh(centerGeo, centerMat);
    centerRing.rotation.x = -Math.PI / 2;
    centerRing.position.y = 0.01;
    scene.add(centerRing);

    // ========== 模型管理 ==========
    let currentModel = null;
    let mixer = null;
    let actions = {};
    let currentActionName = '';
    const clock = new THREE.Clock();
    let autoRotateSpeed = 0.5;

    function loadModel(url) {
      statusEl.innerHTML = `<span>⏳ 加载中: ${url}...</span>`;

      // 清除旧模型
      if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
      }
      mixer = null;
      actions = {};
      currentActionName = '';

      if (typeof THREE.GLTFLoader === 'undefined') {
        statusEl.innerHTML = '<span class="err">❌ THREE.GLTFLoader 不可用！检查GLTFLoader.js是否加载</span>';
        console.error('THREE.GLTFLoader未定义');
        return;
      }

      console.log('[Preview] 开始加载模型:', url);
      const loader = new THREE.GLTFLoader();
      loader.load(url, (gltf) => {
        console.log('[Preview] 模型加载成功:', gltf);
        console.log('[Preview] 场景子节点:', gltf.scene.children.length);
        console.log('[Preview] 动画数量:', gltf.animations.length);
        if (gltf.animations.length > 0) {
          console.log('[Preview] 动画列表:', gltf.animations.map(a => `"${a.name}" (${a.duration.toFixed(2)}s)`));
        }
        
        const model = gltf.scene;
        
        // ===== 诊断：收集骨骼和材质信息 =====
        const diagBones = [];
        model.traverse(child => { if (child.isBone) diagBones.push(child.name); });
        if (diagBones.length === 0) {
          model.traverse(child => {
            if (child.isSkinnedMesh && child.skeleton && child.skeleton.bones) {
              child.skeleton.bones.forEach(b => { if (!diagBones.includes(b.name)) diagBones.push(b.name); });
            }
          });
        }
        console.log('[DIAG] 骨骼数量:', diagBones.length, '骨骼:', diagBones);
        
        model.traverse(child => {
          if (child.isMesh) {
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach((mat, i) => {
              console.log('[DIAG] Mesh:', child.name, '材质:', mat.name, 'color:', mat.color?.toString(), 'map:', mat.map ? 'YES' : 'null', 'metalness:', mat.metalness, 'roughness:', mat.roughness);
            });
          }
        });
        
        // 修复贴图：尝试从GLB提取内嵌贴图，修正PBR参数，否则设默认颜色
        (async () => {
          try {
            // 先尝试从gltf.parser获取贴图
            let embeddedTexture = null;
            if (gltf.parser && gltf.parser.getDependency) {
              try {
                const textures = gltf.parser.json.textures;
                if (textures && textures.length > 0) {
                  embeddedTexture = await gltf.parser.getDependency('texture', 0);
                  console.log('[Preview] 提取到GLB内嵌贴图:', embeddedTexture);
                }
              } catch(texErr) { console.warn('[Preview] 提取贴图失败:', texErr); }
            }
            
            model.traverse(child => {
              if (child.isMesh && child.material) {
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach(mat => {
                  // 如果材质没有贴图，尝试赋值内嵌贴图
                  if (!mat.map && embeddedTexture) {
                    mat.map = embeddedTexture;
                    mat.needsUpdate = true;
                    console.log('[Preview] 已为材质', mat.name, '赋值内嵌贴图');
                  }
                  // 修正KHR_materials_pbrSpecularGlossiness转换问题：metalness=1/roughness=1导致模型过暗
                  if (mat.isMeshStandardMaterial && mat.metalness >= 0.9 && mat.roughness >= 0.9) {
                    console.log('[Preview] 修正PBR参数:', mat.name, 'metalness:', mat.metalness, '→ 0, roughness:', mat.roughness, '→ 0.7');
                    mat.metalness = 0;
                    mat.roughness = 0.7;
                    mat.needsUpdate = true;
                  }
                  // 如果还是没有贴图且颜色是白色，设一个有辨识度的颜色
                  if (!mat.map && (!mat.color || (mat.color.r >= 0.9 && mat.color.g >= 0.9 && mat.color.b >= 0.9))) {
                    mat.color = new THREE.Color(0xc9a04e);
                    mat.needsUpdate = true;
                  }
                });
              }
            });
          } catch(e) { console.warn('[Preview] 贴图修复失败:', e); }
        })();
        
        // 根据模型包围盒自动缩放到合适尺寸（目标高度1.5）
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const targetHeight = 1.5;
        const autoScale = size.y > 0 ? targetHeight / size.y : 0.02;
        model.scale.set(autoScale, autoScale, autoScale);
        scaleSlider.value = autoScale.toFixed(3);
        scaleValue.textContent = autoScale.toFixed(3);
        console.log('[Preview] 模型原始尺寸:', size, '自动缩放:', autoScale);
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(model);
        currentModel = model;

        // 动画
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => {
            const action = mixer.clipAction(clip);
            actions[clip.name] = action;
            actions[clip.name.toLowerCase()] = action;
          });
          // Mixamo: Take 001 → idle
          if (actions['Take 001'] && !actions['idle']) {
            actions['idle'] = actions['Take 001'];
          }
        }
        
        // ========== 程序化生成走路/跑步动画 ==========
        const bones = [];
        // 方法1：直接遍历找Bone节点
        model.traverse(child => { if (child.isBone) bones.push(child); });
        // 方法2：如果没找到，从SkinnedMesh的skeleton.bones获取
        if (bones.length === 0) {
          model.traverse(child => {
            if (child.isSkinnedMesh && child.skeleton && child.skeleton.bones) {
              child.skeleton.bones.forEach(b => { if (!bones.includes(b)) bones.push(b); });
            }
          });
        }
        console.log('[Preview] 骨骼数量:', bones.length);
        if (bones.length > 0) console.log('[Preview] 骨骼列表:', bones.map(b => b.name));
        
        if (bones.length > 0) {
          if (!mixer) mixer = new THREE.AnimationMixer(model);
          
          // ========== 关键发现 ==========
          // BipTrump骨骼有非零初始旋转（大腿rotation.z≈165°, rotation.x≈180°）
          // Three.js AnimationClip的NumberKeyframeTrack设置的是绝对值，不是增量！
          // 所以关键帧值必须 = 骨骼初始旋转 + 摆动量
          // 否则动画会覆盖初始姿态，导致腿翻转
          
          const walkDuration = 0.8;
          const walkFps = 30;
          const walkFrames = Math.round(walkDuration * walkFps);
          const walkTimes = [];
          for (let i = 0; i <= walkFrames; i++) walkTimes.push(i / walkFps);
          
          function findBone(partials) {
            for (const p of partials) {
              const found = bones.find(b => b.name.toLowerCase().includes(p.toLowerCase()));
              if (found) return found;
            }
            return null;
          }
          
          // BipTrump/Mixamo/通用骨骼映射
          const bLLeg = findBone(['l thigh','l_thigh','leftleg','leg_l','left_up_leg','upperleg_l','thigh_l','LeftUpLeg']);
          const bRLeg = findBone(['r thigh','r_thigh','rightleg','leg_r','right_up_leg','upperleg_r','thigh_r','RightUpLeg']);
          const bLKnee = findBone(['l calf','l_calf','leftknee','knee_l','left_low_leg','lowerleg_l','shin_l','LeftLowLeg','calf_l']);
          const bRKnee = findBone(['r calf','r_calf','rightknee','knee_r','right_low_leg','lowerleg_r','shin_r','RightLowLeg','calf_r']);
          const bLArm = findBone(['l upperarm','l_upperarm','leftarm','arm_l','left_up_arm','upperarm_l','LeftUpArm']);
          const bRArm = findBone(['r upperarm','r_upperarm','rightarm','arm_r','right_up_arm','upperarm_r','RightUpArm']);
          const bSpine = findBone(['spine1','spine','chest','torso','body','hips','pelvis']);
          const bHead = findBone(['head','neck','skull']);
          // 根骨骼（骨盆/根节点）- 身体上下弹跳用
          const bRoot = findBone(['biptrump_00','biptrump','root','pelvis','hips','hip']) || bones[0];
          // 脚部骨骼 - 用于计算脚底最低点
          const bLFoot = findBone(['l foot','l_foot','leftfoot','foot_l','left_ankle','ankle_l','LeftFoot']);
          const bRFoot = findBone(['r foot','r_foot','rightfoot','foot_r','right_ankle','ankle_r','RightFoot']);
          
          console.log('[Preview] 骨骼匹配:', {lLeg:bLLeg?.name, rLeg:bRLeg?.name, lKnee:bLKnee?.name, rKnee:bRKnee?.name, lArm:bLArm?.name, rArm:bRArm?.name, spine:bSpine?.name, head:bHead?.name});
          
          // 获取骨骼初始euler旋转（用于在关键帧中保持初始姿态）
          function getInitRot(bone) {
            if (!bone) return {x:0,y:0,z:0};
            // 确保euler已从quaternion更新
            bone.updateMatrixWorld(true);
            return {x: bone.rotation.x, y: bone.rotation.y, z: bone.rotation.z};
          }
          
          // 辅助函数：生成正弦关键帧值（叠加到初始值上）
          function sineTrack(bone, axis, amp, phase, dur, times) {
            const init = getInitRot(bone)[axis];
            return times.map(t => init + amp * Math.sin(2 * Math.PI * t / dur + phase));
          }
          // 余弦关键帧（用于位移）
          function cosTrack(bone, axis, amp, phase, dur, times) {
            const init = axis === 'y' ? (bone.position?.y || 0) : (bone.position?.x || 0);
            return times.map(t => init + amp * Math.cos(2 * Math.PI * t / dur + phase));
          }
          
          const walkTracks = [];
          const legSwing = 0.4, armSwing = 0.35, kneeSwing = 0.3, bodyBob = 1, headBob = 0.05;
          
          // 大腿：绕Z轴摆动，+Z增量=向前抬腿（检测确认）
          // 对侧协调：左腿相位0，右腿相位π
          if (bLLeg) walkTracks.push(new THREE.NumberKeyframeTrack(bLLeg.name+'.rotation[z]',walkTimes,sineTrack(bLLeg,'z',legSwing,0,walkDuration,walkTimes)));
          if (bRLeg) walkTracks.push(new THREE.NumberKeyframeTrack(bRLeg.name+'.rotation[z]',walkTimes,sineTrack(bRLeg,'z',legSwing,Math.PI,walkDuration,walkTimes)));
          
          // 小腿：膝盖弯曲=-Z增量（检测确认），在腿向前摆时弯曲
          if (bLKnee) {
            const init = getInitRot(bLKnee).z;
            const v = walkTimes.map(t => {
              const phase = Math.sin(2*Math.PI*t/walkDuration);
              return init + (phase > 0 ? -kneeSwing * phase : 0);
            });
            walkTracks.push(new THREE.NumberKeyframeTrack(bLKnee.name+'.rotation[z]',walkTimes,v));
          }
          if (bRKnee) {
            const init = getInitRot(bRKnee).z;
            const v = walkTimes.map(t => {
              const phase = Math.sin(2*Math.PI*t/walkDuration + Math.PI);
              return init + (phase > 0 ? -kneeSwing * phase : 0);
            });
            walkTracks.push(new THREE.NumberKeyframeTrack(bRKnee.name+'.rotation[z]',walkTimes,v));
          }
          
          // 手臂：-Z增量=向前摆（检测确认），对侧协调
          if (bLArm) walkTracks.push(new THREE.NumberKeyframeTrack(bLArm.name+'.rotation[z]',walkTimes,sineTrack(bLArm,'z',-armSwing,Math.PI,walkDuration,walkTimes)));
          if (bRArm) walkTracks.push(new THREE.NumberKeyframeTrack(bRArm.name+'.rotation[z]',walkTimes,sineTrack(bRArm,'z',-armSwing,0,walkDuration,walkTimes)));
          
          // 身体上下弹跳：BipTrump根骨骼局部+X=世界上，用position[x]
          // 弹跳量=bodyBob，双脚触地时最高（cos=1），单脚支撑时最低（cos=-1）
          if (bRoot) {
            const rootInitX = bRoot.position?.x || 0;
            const rootBobVals = walkTimes.map(t => rootInitX + bodyBob * Math.cos(2 * Math.PI * t / walkDuration));
            walkTracks.push(new THREE.NumberKeyframeTrack(bRoot.name+'.position[x]',walkTimes,rootBobVals));
          }
          
          // 头部：轻微Y轴旋转
          if (bHead) walkTracks.push(new THREE.NumberKeyframeTrack(bHead.name+'.rotation[y]',walkTimes,sineTrack(bHead,'y',headBob,0,walkDuration,walkTimes)));
          
          if (walkTracks.length > 0) {
            const walkClip = new THREE.AnimationClip('walk', walkDuration, walkTracks);
            actions['walk'] = mixer.clipAction(walkClip);
            console.log('[Preview] 生成走路动画:', walkTracks.length, '条轨道');
          }
          
          // --- 跑步动画 ---
          const runDuration = 0.5;
          const runFrames = Math.round(runDuration * walkFps);
          const runTimes = [];
          for (let i = 0; i <= runFrames; i++) runTimes.push(i / walkFps);
          
          const runTracks = [];
          const rLegSwing = 0.7, rArmSwing = 0.6, rKneeSwing = 0.6, rBodyBob = 2;
          
          if (bLLeg) runTracks.push(new THREE.NumberKeyframeTrack(bLLeg.name+'.rotation[z]',runTimes,sineTrack(bLLeg,'z',rLegSwing,0,runDuration,runTimes)));
          if (bRLeg) runTracks.push(new THREE.NumberKeyframeTrack(bRLeg.name+'.rotation[z]',runTimes,sineTrack(bRLeg,'z',rLegSwing,Math.PI,runDuration,runTimes)));
          if (bLKnee) {
            const init = getInitRot(bLKnee).z;
            const v = runTimes.map(t => {
              const phase = Math.sin(2*Math.PI*t/runDuration);
              return init + (phase > 0 ? -rKneeSwing * phase : 0);
            });
            runTracks.push(new THREE.NumberKeyframeTrack(bLKnee.name+'.rotation[z]',runTimes,v));
          }
          if (bRKnee) {
            const init = getInitRot(bRKnee).z;
            const v = runTimes.map(t => {
              const phase = Math.sin(2*Math.PI*t/runDuration + Math.PI);
              return init + (phase > 0 ? -rKneeSwing * phase : 0);
            });
            runTracks.push(new THREE.NumberKeyframeTrack(bRKnee.name+'.rotation[z]',runTimes,v));
          }
          if (bLArm) runTracks.push(new THREE.NumberKeyframeTrack(bLArm.name+'.rotation[z]',runTimes,sineTrack(bLArm,'z',-rArmSwing,Math.PI,runDuration,runTimes)));
          if (bRArm) runTracks.push(new THREE.NumberKeyframeTrack(bRArm.name+'.rotation[z]',runTimes,sineTrack(bRArm,'z',-rArmSwing,0,runDuration,runTimes)));
          // 身体弹跳：根骨骼position[y]，跑步弹跳更大
          if (bRoot) {
            const rootInitX = bRoot.position?.x || 0;
            const rootBobVals = runTimes.map(t => rootInitX + rBodyBob * Math.cos(2 * Math.PI * t / runDuration));
            runTracks.push(new THREE.NumberKeyframeTrack(bRoot.name+'.position[x]',runTimes,rootBobVals));
          }
          
          if (runTracks.length > 0) {
            const runClip = new THREE.AnimationClip('run', runDuration, runTracks);
            actions['run'] = mixer.clipAction(runClip);
            console.log('[Preview] 生成跑步动画:', runTracks.length, '条轨道');
          }
        }
        
        // 更新动作列表UI
        updateActionList();
        
        // 默认播放idle或第一个
        const firstAction = actions['idle'] || actions['Idle'] || actions[Object.keys(actions)[0]];
        if (firstAction) {
          firstAction.reset().fadeIn(0.3).play();
          currentActionName = Object.keys(actions).find(k => actions[k] === firstAction) || '';
        }
        
        if (Object.keys(actions).length === 0) {
          actionListEl.innerHTML = '<span style="color:#555;font-size:12px">无可用动作</span>';
        }

        // 计算模型包围盒，调整相机
        const modelBox = new THREE.Box3().setFromObject(model);
        const modelSize = modelBox.getSize(new THREE.Vector3());
        const center = modelBox.getCenter(new THREE.Vector3());
        
        // 自动调整相机距离
        const maxDim = Math.max(modelSize.x, modelSize.y, modelSize.z);
        orbit.spherical.radius = maxDim * 3;
        orbit.target.copy(center);
        updateCameraFromSpherical();

        statusEl.innerHTML = `<span class="ok">✅ 加载成功</span> | 尺寸: ${modelSize.x.toFixed(2)}×${modelSize.y.toFixed(2)}×${modelSize.z.toFixed(2)} | 动画: ${gltf.animations.length}个`;

      }, 
      (progress) => {
        if (progress.total > 0) {
          const pct = Math.round(progress.loaded / progress.total * 100);
          statusEl.innerHTML = `<span>⏳ 加载中: ${pct}%</span>`;
        }
      },
      (err) => {
        statusEl.innerHTML = `<span class="err">❌ 加载失败: ${err.message || err}</span>`;
        console.error('[Preview] 模型加载失败:', err);
      });
    }

    function playAction(name) {
      if (!mixer || !actions[name]) {
        console.warn('[Preview] 动作不存在:', name, '可用:', Object.keys(actions));
        return false;
      }
      const action = actions[name];
      if (currentActionName === name) return true;
      // 淡出旧动作
      const oldAction = actions[currentActionName];
      if (oldAction && oldAction !== action) oldAction.fadeOut(0.3);
      action.reset().fadeIn(0.3).play();
      currentActionName = name;
      
      // 更新按钮高亮
      document.querySelectorAll('.act-btn[data-action]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.action === name);
      });
      return true;
    }

    function updateActionList() {
      // 去重：只显示原始名称（非小写别名）
      const names = [];
      const seen = new Set();
      Object.keys(actions).forEach(k => {
        const lower = k.toLowerCase();
        if (!seen.has(lower)) {
          seen.add(lower);
          names.push(k);
        }
      });

      if (names.length === 0) {
        actionListEl.innerHTML = '<span style="color:#555;font-size:12px">无动画</span>';
        return;
      }
      actionListEl.innerHTML = names.map(name => 
        `<button class="act-btn${name === currentActionName ? ' active' : ''}" data-action="${name}">${name}</button>`
      ).join('');
      
      actionListEl.querySelectorAll('.act-btn').forEach(btn => {
        btn.addEventListener('click', () => playAction(btn.dataset.action));
      });
    }

    // ========== 事件绑定 ==========
    document.getElementById('btn-load').addEventListener('click', () => {
      const url = document.getElementById('model-url').value;
      loadModel(url);
    });

    scaleSlider.addEventListener('input', () => {
      const v = parseFloat(scaleSlider.value);
      scaleValue.textContent = v.toFixed(1);
      if (currentModel) currentModel.scale.set(v, v, v);
    });

    rotateSlider.addEventListener('input', () => {
      autoRotateSpeed = parseFloat(rotateSlider.value);
      rotateValue.textContent = autoRotateSpeed.toFixed(1);
    });

    // 窗口resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ========== 渲染循环 ==========
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      
      // 更新动画混合器
      if (mixer) mixer.update(delta);
      
      // 自动旋转模型
      if (currentModel && autoRotateSpeed > 0) {
        currentModel.rotation.y += autoRotateSpeed * delta;
      }
      
      renderer.render(scene, camera);
    }

    // ========== 启动 ==========
    statusEl.innerHTML = '<span class="ok">✅ 场景就绪</span> | 自动加载默认模型...';
    
    // 自动加载默认模型
    loadModel('assets/monster.glb');
    
    animate();
  </script>
</body>
</html>
