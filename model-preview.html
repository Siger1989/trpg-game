<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型预览 - 暗夜跑团</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      color: #c9a04e;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #preview-container {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* 控制面板 */
    .controls {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(10,10,18,0.92);
      border: 1px solid rgba(201,160,78,0.3);
      border-radius: 8px;
      padding: 16px;
      min-width: 220px;
      max-width: 280px;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 10;
    }
    .controls h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #c9a04e;
    }
    .controls label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .controls select, .controls input[type="range"] {
      width: 100%;
      background: #1a1a24;
      color: #c9a04e;
      border: 1px solid rgba(201,160,78,0.3);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .controls input[type="range"] {
      -webkit-appearance: none;
      height: 6px;
      padding: 0;
      border: none;
      background: #333;
      border-radius: 3px;
    }
    .controls input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #c9a04e;
      border-radius: 50%;
      cursor: pointer;
    }

    /* 动作按钮 */
    .action-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .act-btn {
      padding: 5px 10px;
      background: rgba(201,160,78,0.1);
      border: 1px solid rgba(201,160,78,0.3);
      border-radius: 4px;
      color: #c9a04e;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .act-btn:hover {
      background: rgba(201,160,78,0.2);
      border-color: #c9a04e;
    }
    .act-btn.active {
      background: rgba(201,160,78,0.3);
      border-color: #c9a04e;
      color: #fff;
    }

    /* 状态信息 */
    .status {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(10,10,18,0.85);
      border: 1px solid rgba(201,160,78,0.2);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #888;
      z-index: 10;
    }
    .status .ok { color: #4a4; }
    .status .err { color: #c44; }

    /* 模型选择 */
    .model-select { margin-top: 8px; }
    .model-select option { background: #1a1a24; }

    /* 提示文字 */
    .hint {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #555;
      z-index: 10;
    }

    /* 加载按钮 */
    .load-btn {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: rgba(201,160,78,0.15);
      border: 1px solid rgba(201,160,78,0.4);
      border-radius: 4px;
      color: #c9a04e;
      font-size: 13px;
      cursor: pointer;
    }
    .load-btn:hover { background: rgba(201,160,78,0.25); }
  </style>
</head>
<body>
  <div id="preview-container"></div>

  <div class="controls">
    <h2>🎭 模型预览</h2>
    
    <label>选择模型</label>
    <div class="model-select">
      <select id="model-url">
        <option value="assets/monster.glb">monster.glb</option>
      </select>
    </div>
    <button class="load-btn" id="btn-load">加载模型</button>

    <label>可用动作</label>
    <div class="action-list" id="action-list">
      <span style="color:#555;font-size:12px">加载模型后显示...</span>
    </div>

    <label>缩放 <span id="scale-value">auto</span></label>
    <input type="range" id="scale-slider" min="0.001" max="0.1" step="0.001" value="0.02">

    <label>旋转速度 <span id="rotate-value">0.5</span></label>
    <input type="range" id="rotate-slider" min="0" max="3" step="0.1" value="0.5">
  </div>

  <div class="status" id="status">初始化中...</div>
  <div class="hint">鼠标拖拽旋转 | 滚轮缩放 | 右键平移</div>

  <!-- Three.js -->
  <script src="js/three.min.js"></script>
  <script src="js/GLTFLoader.js"></script>

  <script>
    // ========== 预览场景初始化 ==========
    const container = document.getElementById('preview-container');
    const statusEl = document.getElementById('status');
    const actionListEl = document.getElementById('action-list');
    const scaleSlider = document.getElementById('scale-slider');
    const scaleValue = document.getElementById('scale-value');
    const rotateSlider = document.getElementById('rotate-slider');
    const rotateValue = document.getElementById('rotate-value');

    // Three.js基础
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.FogExp2(0x0a0a14, 0.005);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2.5, 3);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    // ========== 简易轨道控制器（不用CameraControls，避免冲突） ==========
    const orbit = {
      target: new THREE.Vector3(0, 1, 0),
      spherical: { radius: 5, theta: Math.PI / 4, phi: Math.PI / 3 },
      dragging: false,
      panning: false,
      lastPos: { x: 0, y: 0 },
      damping: 0.92,
      velocity: { theta: 0, phi: 0, radius: 0 }
    };

    function updateCameraFromSpherical() {
      const s = orbit.spherical;
      const sinPhi = Math.sin(s.phi);
      camera.position.set(
        orbit.target.x + s.radius * sinPhi * Math.sin(s.theta),
        orbit.target.y + s.radius * Math.cos(s.phi),
        orbit.target.z + s.radius * sinPhi * Math.cos(s.theta)
      );
      camera.lookAt(orbit.target);
    }
    updateCameraFromSpherical();

    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', (e) => {
      if (e.button === 2) { orbit.panning = true; }
      else { orbit.dragging = true; }
      orbit.lastPos = { x: e.clientX, y: e.clientY };
      e.preventDefault();
    });
    canvas.addEventListener('pointermove', (e) => {
      const dx = e.clientX - orbit.lastPos.x;
      const dy = e.clientY - orbit.lastPos.y;
      orbit.lastPos = { x: e.clientX, y: e.clientY };
      if (orbit.dragging) {
        orbit.spherical.theta -= dx * 0.005;
        orbit.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, orbit.spherical.phi - dy * 0.005));
        updateCameraFromSpherical();
      }
      if (orbit.panning) {
        const right = new THREE.Vector3();
        const up = new THREE.Vector3(0, 1, 0);
        right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), up).normalize();
        orbit.target.addScaledVector(right, -dx * 0.01);
        orbit.target.y += dy * 0.01;
        updateCameraFromSpherical();
      }
    });
    canvas.addEventListener('pointerup', () => { orbit.dragging = false; orbit.panning = false; });
    canvas.addEventListener('pointerleave', () => { orbit.dragging = false; orbit.panning = false; });
    canvas.addEventListener('wheel', (e) => {
      orbit.spherical.radius *= (1 + e.deltaY * 0.001);
      orbit.spherical.radius = Math.max(1, Math.min(20, orbit.spherical.radius));
      updateCameraFromSpherical();
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // 灯光
    const ambient = new THREE.AmbientLight(0x8888aa, 1.0);
    scene.add(ambient);
    const hemi = new THREE.HemisphereLight(0x9999cc, 0x444422, 0.8);
    scene.add(hemi);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0xc9a04e, 0.5, 10);
    pointLight.position.set(-2, 3, -2);
    scene.add(pointLight);

    // 地面参考（格子线）
    const gridHelper = new THREE.GridHelper(10, 10, 0x333344, 0x222233);
    scene.add(gridHelper);

    // 中心标记
    const centerGeo = new THREE.RingGeometry(0.3, 0.5, 16);
    const centerMat = new THREE.MeshBasicMaterial({ color: 0xc9a04e, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
    const centerRing = new THREE.Mesh(centerGeo, centerMat);
    centerRing.rotation.x = -Math.PI / 2;
    centerRing.position.y = 0.01;
    scene.add(centerRing);

    // ========== 模型管理 ==========
    let currentModel = null;
    let mixer = null;
    let actions = {};
    let currentActionName = '';
    const clock = new THREE.Clock();
    let autoRotateSpeed = 0.5;

    function loadModel(url) {
      statusEl.innerHTML = `<span>⏳ 加载中: ${url}...</span>`;

      // 清除旧模型
      if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
      }
      mixer = null;
      actions = {};
      currentActionName = '';

      if (typeof THREE.GLTFLoader === 'undefined') {
        statusEl.innerHTML = '<span class="err">❌ THREE.GLTFLoader 不可用！检查GLTFLoader.js是否加载</span>';
        console.error('THREE.GLTFLoader未定义');
        return;
      }

      console.log('[Preview] 开始加载模型:', url);
      const loader = new THREE.GLTFLoader();
      loader.load(url, (gltf) => {
        console.log('[Preview] 模型加载成功:', gltf);
        console.log('[Preview] 场景子节点:', gltf.scene.children.length);
        console.log('[Preview] 动画数量:', gltf.animations.length);
        if (gltf.animations.length > 0) {
          console.log('[Preview] 动画列表:', gltf.animations.map(a => `"${a.name}" (${a.duration.toFixed(2)}s)`));
        }

        const model = gltf.scene;
        // 根据模型包围盒自动缩放到合适尺寸（目标高度1.5）
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const targetHeight = 1.5;
        const autoScale = size.y > 0 ? targetHeight / size.y : 0.02;
        model.scale.set(autoScale, autoScale, autoScale);
        scaleSlider.value = autoScale.toFixed(3);
        scaleValue.textContent = autoScale.toFixed(3);
        console.log('[Preview] 模型原始尺寸:', size, '自动缩放:', autoScale);
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(model);
        currentModel = model;

        // 动画
        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => {
            const action = mixer.clipAction(clip);
            actions[clip.name] = action;
            actions[clip.name.toLowerCase()] = action;
          });
          // Mixamo: Take 001 → idle
          if (actions['Take 001'] && !actions['idle']) {
            actions['idle'] = actions['Take 001'];
          }
        }
        
        // ========== 程序化生成走路/跑步动画 ==========
        const bones = [];
        model.traverse(child => { if (child.isBone) bones.push(child); });
        console.log('[Preview] 骨骼数量:', bones.length, '骨骼列表:', bones.map(b => b.name));
        
        if (bones.length > 0) {
          if (!mixer) mixer = new THREE.AnimationMixer(model);
          
          // --- 走路动画 ---
          const walkDuration = 0.8;
          const walkFps = 30;
          const walkFrames = Math.round(walkDuration * walkFps);
          const walkTimes = [];
          for (let i = 0; i <= walkFrames; i++) walkTimes.push(i / walkFps);
          
          function findBone(partials) {
            for (const p of partials) {
              const found = bones.find(b => b.name.toLowerCase().includes(p.toLowerCase()));
              if (found) return found;
            }
            return null;
          }
          function sineKF(amp, phase, dur) { return walkTimes.map(t => amp * Math.sin(2 * Math.PI * t / dur + phase)); }
          function cosKF(amp, phase, dur) { return walkTimes.map(t => amp * Math.cos(2 * Math.PI * t / dur + phase)); }
          
          const walkTracks = [];
          const legSwing = 0.4, armSwing = 0.35, kneeSwing = 0.25, bodyBob = 0.03, headSwing = 0.05;
          
          const lLeg = findBone(['leftleg','leg_l','left_up_leg','upperleg_l','thigh_l','LeftUpLeg']);
          const rLeg = findBone(['rightleg','leg_r','right_up_leg','upperleg_r','thigh_r','RightUpLeg']);
          if (lLeg) walkTracks.push(new THREE.NumberKeyframeTrack(lLeg.name+'.rotation[x]',walkTimes,sineKF(legSwing,0,walkDuration)));
          if (rLeg) walkTracks.push(new THREE.NumberKeyframeTrack(rLeg.name+'.rotation[x]',walkTimes,sineKF(legSwing,Math.PI,walkDuration)));
          
          const lKnee = findBone(['leftknee','knee_l','left_low_leg','lowerleg_l','shin_l','LeftLowLeg','calf_l']);
          const rKnee = findBone(['rightknee','knee_r','right_low_leg','lowerleg_r','shin_r','RightLowLeg','calf_r']);
          if (lKnee) { const v=walkTimes.map(t=>{const p=Math.sin(2*Math.PI*t/walkDuration);return p<0?-kneeSwing*Math.abs(p):0;}); walkTracks.push(new THREE.NumberKeyframeTrack(lKnee.name+'.rotation[x]',walkTimes,v)); }
          if (rKnee) { const v=walkTimes.map(t=>{const p=Math.sin(2*Math.PI*t/walkDuration+Math.PI);return p<0?-kneeSwing*Math.abs(p):0;}); walkTracks.push(new THREE.NumberKeyframeTrack(rKnee.name+'.rotation[x]',walkTimes,v)); }
          
          const lArm = findBone(['leftarm','arm_l','left_up_arm','upperarm_l','LeftUpArm']);
          const rArm = findBone(['rightarm','arm_r','right_up_arm','upperarm_r','RightUpArm']);
          if (lArm) walkTracks.push(new THREE.NumberKeyframeTrack(lArm.name+'.rotation[x]',walkTimes,sineKF(armSwing,Math.PI,walkDuration)));
          if (rArm) walkTracks.push(new THREE.NumberKeyframeTrack(rArm.name+'.rotation[x]',walkTimes,sineKF(armSwing,0,walkDuration)));
          
          const spine = findBone(['spine','chest','torso','body','hips','pelvis']);
          if (spine) walkTracks.push(new THREE.NumberKeyframeTrack(spine.name+'.position[y]',walkTimes,cosKF(bodyBob,0,walkDuration).map(v=>v+(spine.position?.y||0))));
          
          const head = findBone(['head','neck','skull']);
          if (head) walkTracks.push(new THREE.NumberKeyframeTrack(head.name+'.rotation[y]',walkTimes,sineKF(headSwing,0,walkDuration)));
          
          if (walkTracks.length > 0) {
            const walkClip = new THREE.AnimationClip('walk', walkDuration, walkTracks);
            actions['walk'] = mixer.clipAction(walkClip);
            console.log('[Preview] 生成走路动画:', walkTracks.length, '条轨道');
          }
          
          // --- 跑步动画（加速版） ---
          const runDuration = 0.5;
          const runFrames = Math.round(runDuration * walkFps);
          const runTimes = [];
          for (let i = 0; i <= runFrames; i++) runTimes.push(i / walkFps);
          
          function sineKF2(amp, phase, dur) { return runTimes.map(t => amp * Math.sin(2 * Math.PI * t / dur + phase)); }
          function cosKF2(amp, phase, dur) { return runTimes.map(t => amp * Math.cos(2 * Math.PI * t / dur + phase)); }
          
          const runTracks = [];
          const rLegSwing = 0.7, rArmSwing = 0.6, rKneeSwing = 0.5, rBodyBob = 0.06;
          
          if (lLeg) runTracks.push(new THREE.NumberKeyframeTrack(lLeg.name+'.rotation[x]',runTimes,sineKF2(rLegSwing,0,runDuration)));
          if (rLeg) runTracks.push(new THREE.NumberKeyframeTrack(rLeg.name+'.rotation[x]',runTimes,sineKF2(rLegSwing,Math.PI,runDuration)));
          if (lKnee) { const v=runTimes.map(t=>{const p=Math.sin(2*Math.PI*t/runDuration);return p<0?-rKneeSwing*Math.abs(p):0;}); runTracks.push(new THREE.NumberKeyframeTrack(lKnee.name+'.rotation[x]',runTimes,v)); }
          if (rKnee) { const v=runTimes.map(t=>{const p=Math.sin(2*Math.PI*t/runDuration+Math.PI);return p<0?-rKneeSwing*Math.abs(p):0;}); runTracks.push(new THREE.NumberKeyframeTrack(rKnee.name+'.rotation[x]',runTimes,v)); }
          if (lArm) runTracks.push(new THREE.NumberKeyframeTrack(lArm.name+'.rotation[x]',runTimes,sineKF2(rArmSwing,Math.PI,runDuration)));
          if (rArm) runTracks.push(new THREE.NumberKeyframeTrack(rArm.name+'.rotation[x]',runTimes,sineKF2(rArmSwing,0,runDuration)));
          if (spine) runTracks.push(new THREE.NumberKeyframeTrack(spine.name+'.position[y]',runTimes,cosKF2(rBodyBob,0,runDuration).map(v=>v+(spine.position?.y||0))));
          
          if (runTracks.length > 0) {
            const runClip = new THREE.AnimationClip('run', runDuration, runTracks);
            actions['run'] = mixer.clipAction(runClip);
            console.log('[Preview] 生成跑步动画:', runTracks.length, '条轨道');
          }
        }
        
        // 更新动作列表UI
        updateActionList();
        
        // 默认播放idle或第一个
        const firstAction = actions['idle'] || actions['Idle'] || actions[Object.keys(actions)[0]];
        if (firstAction) {
          firstAction.reset().fadeIn(0.3).play();
          currentActionName = Object.keys(actions).find(k => actions[k] === firstAction) || '';
        }
        
        if (Object.keys(actions).length === 0) {
          actionListEl.innerHTML = '<span style="color:#555;font-size:12px">无可用动作</span>';
        }

        // 计算模型包围盒，调整相机
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        
        // 自动调整相机距离
        const maxDim = Math.max(size.x, size.y, size.z);
        orbit.spherical.radius = maxDim * 3;
        orbit.target.copy(center);
        updateCameraFromSpherical();

        statusEl.innerHTML = `<span class="ok">✅ 加载成功</span> | 尺寸: ${size.x.toFixed(2)}×${size.y.toFixed(2)}×${size.z.toFixed(2)} | 动画: ${gltf.animations.length}个`;

      }, 
      (progress) => {
        if (progress.total > 0) {
          const pct = Math.round(progress.loaded / progress.total * 100);
          statusEl.innerHTML = `<span>⏳ 加载中: ${pct}%</span>`;
        }
      },
      (err) => {
        statusEl.innerHTML = `<span class="err">❌ 加载失败: ${err.message || err}</span>`;
        console.error('[Preview] 模型加载失败:', err);
      });
    }

    function playAction(name) {
      if (!mixer || !actions[name]) {
        console.warn('[Preview] 动作不存在:', name, '可用:', Object.keys(actions));
        return false;
      }
      const action = actions[name];
      if (currentActionName === name) return true;
      // 淡出旧动作
      const oldAction = actions[currentActionName];
      if (oldAction && oldAction !== action) oldAction.fadeOut(0.3);
      action.reset().fadeIn(0.3).play();
      currentActionName = name;
      
      // 更新按钮高亮
      document.querySelectorAll('.act-btn[data-action]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.action === name);
      });
      return true;
    }

    function updateActionList() {
      // 去重：只显示原始名称（非小写别名）
      const names = [];
      const seen = new Set();
      Object.keys(actions).forEach(k => {
        const lower = k.toLowerCase();
        if (!seen.has(lower)) {
          seen.add(lower);
          names.push(k);
        }
      });

      if (names.length === 0) {
        actionListEl.innerHTML = '<span style="color:#555;font-size:12px">无动画</span>';
        return;
      }
      actionListEl.innerHTML = names.map(name => 
        `<button class="act-btn${name === currentActionName ? ' active' : ''}" data-action="${name}">${name}</button>`
      ).join('');
      
      actionListEl.querySelectorAll('.act-btn').forEach(btn => {
        btn.addEventListener('click', () => playAction(btn.dataset.action));
      });
    }

    // ========== 事件绑定 ==========
    document.getElementById('btn-load').addEventListener('click', () => {
      const url = document.getElementById('model-url').value;
      loadModel(url);
    });

    scaleSlider.addEventListener('input', () => {
      const v = parseFloat(scaleSlider.value);
      scaleValue.textContent = v.toFixed(1);
      if (currentModel) currentModel.scale.set(v, v, v);
    });

    rotateSlider.addEventListener('input', () => {
      autoRotateSpeed = parseFloat(rotateSlider.value);
      rotateValue.textContent = autoRotateSpeed.toFixed(1);
    });

    // 窗口resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ========== 渲染循环 ==========
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      
      // 更新动画混合器
      if (mixer) mixer.update(delta);
      
      // 自动旋转模型
      if (currentModel && autoRotateSpeed > 0) {
        currentModel.rotation.y += autoRotateSpeed * delta;
      }
      
      renderer.render(scene, camera);
    }

    // ========== 启动 ==========
    statusEl.innerHTML = '<span class="ok">✅ 场景就绪</span> | 自动加载默认模型...';
    
    // 自动加载默认模型
    loadModel('assets/monster.glb');
    
    animate();
  </script>
</body>
</html>
